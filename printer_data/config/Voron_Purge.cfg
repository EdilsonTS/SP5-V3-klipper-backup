[gcode_macro VORON_PURGE]
description: A purge macro that adapts to be near your actual printed objects
gcode:
    # Get relevant printer params
    {% set travel_speed = (printer.toolhead.max_velocity) * 60 | float %}
    {% set cross_section = printer.configfile.settings.extruder.max_extrude_cross_section | float %}
    
    # Use firmware retraction if it is defined
    {% if printer.firmware_retraction is defined %}
        {% set RETRACT = G10 | string %}
        {% set UNRETRACT = G11 | string %}
    {% else %}
        {% set RETRACT = 'G1 E-.5 F2100' | string %}
        {% set UNRETRACT = 'G1 E.5 F2100' | string %}
    {% endif %}

    # Get purge settings from _Kamp_Settings
    {% set kamp_settings = printer["gcode_macro _KAMP_Settings"] %}
    {% set verbose_enable = kamp_settings.verbose_enable | abs %}
    {% set purge_height = kamp_settings.purge_height | float %}
    {% set tip_distance = kamp_settings.tip_distance | float %}
    {% set purge_margin = kamp_settings.purge_margin | float %}
    {% set purge_amount = kamp_settings.purge_amount | float %}
    {% set flow_rate = kamp_settings.flow_rate | float %}
    {% set size = 10 | float %}

    # Calculate purge origins and centers from objects
    {% set all_points = printer.exclude_object.objects | map(attribute='polygon') | sum(start=[]) %}    # Get all object points
    {% set purge_x_min = (all_points | map(attribute=0) | min | default(0)) %}                          # Object x min
    {% set purge_x_max = (all_points | map(attribute=0) | max | default(0)) %}                          # Object x max
    {% set purge_y_min = (all_points | map(attribute=1) | min | default(0)) %}                          # Object y min
    {% set purge_y_max = (all_points | map(attribute=1) | max | default(0)) %}                          # Object y max

    {% set purge_x_center = ([((purge_x_max + purge_x_min) / 2) - (purge_amount / 2), 0] | max) %}      # Create center point of purge line relative to print on X axis
    {% set purge_y_center = ([((purge_y_max + purge_y_min) / 2) - (purge_amount / 2), 0] | max) %}      # Create center point of purge line relative to print on Y axis

    {% set purge_x_origin = ([purge_x_min - purge_margin, 0] | max) %}                                  # Add margin to x min, compare to 0, and choose the larger
    {% set purge_y_origin = ([purge_y_min - purge_margin, 0] | max) %}                                  # Add margin to y min, compare to 0, and choose the larger

    # Calculate purge speed
    # {% set purge_move_speed = (flow_rate / 5.0) * 60 | float %}
    {% set purge_move_speed = (flow_rate / 3.0) * 60 | float %}

    {% if cross_section < 5 %}

        {action_respond_info("[Extruder] max_extrude_cross_section is insufficient for purge, please set it to 5 or greater. Purge skipped.")}

    {% else %}

        {% if verbose_enable == True %}

        {action_respond_info("Moving filament tip {}mms".format(                                                                 
            (tip_distance),                                                                                      
        )) }
        {% endif %}

        {% if printer.firmware_retraction is defined %}
            {action_respond_info("KAMP purge is using firmware retraction.")}
        {% else %}
            {action_respond_info("KAMP purge is not using firmware retraction, it is recommended to configure it.")}
        {% endif %}

            SAVE_GCODE_STATE NAME=Prepurge_State                                                            # Create gcode state

            G92 E0                                                                                          # Reset extruder
            G0 F{travel_speed}                                                                              # Set travel speed
            G90                                                                                             # Absolute positioning
            G0 X{purge_x_origin} Y{purge_y_origin+size/2}                                                   # Move to purge position
            G0 Z{purge_height}                                                                              # Move to purge Z height
            M83                                                                                             # Relative extrusion mode
            G1 E{tip_distance} F{purge_move_speed}                                                          # Move tip of filament to nozzle
            G1 X{purge_x_origin+size*0.289} Y{purge_y_origin+size} E{purge_amount/4} F{purge_move_speed}    # Purge first line of logo
            {RETRACT}                                                                                       # Retract
            G0 Z{purge_height*2}                                                                            # Z hop
            G0 X{purge_x_origin+size*0.789} Y{purge_y_origin+size}                                          # Move to second purge line origin
            G0 Z{purge_height}                                                                              # Move to purge Z height
            {UNRETRACT}                                                                                     # Recover
            G1 X{purge_x_origin+size*0.211} Y{purge_y_origin} E{purge_amount/2} F{purge_move_speed}         # Purge second line of logo
            {RETRACT}                                                                                       # Retract
            G0 Z{purge_height*2}                                                                            # Z hop
            G0 X{purge_x_origin+size*0.711} Y{purge_y_origin}                                               # Move to third purge line origin
            G0 Z{purge_height}                                                                              # Move to purge Z height
            {UNRETRACT}                                                                                     # Recover
            G1 X{purge_x_origin+size} Y{purge_y_origin+size/2}  E{purge_amount/4} F{purge_move_speed}       # Purge third line of logo
            {RETRACT}                                                                                       # Retract




            # --- INÍCIO DO QUADRADO DE ESTABILIZAÇÃO (5x5mm) ---
            {% set square_size = 5 %}
            {% set line_spacing = 0.4 %} # Espaçamento entre as linhas de preenchimento
            
            G0 Z{purge_height * 2} F{travel_speed}          # Sobe para deslocar
            G0 X{purge_x_origin + size + 10} Y{purge_y_origin} F{travel_speed} # Posiciona ao lado do logo
            G0 Z{purge_height} F{purge_move_speed}          # Desce para altura de impressão
            {UNRETRACT}                                     # Recupera o filamento
            
            # Desenha o contorno e preenchimento simples
            G1 Y{purge_y_origin + square_size} E{purge_amount/15} F{purge_move_speed} # Lado 1
            G1 X{purge_x_origin + size + 2 + line_spacing} F{purge_move_speed}        # Move para o lado
            G1 Y{purge_y_origin} E{purge_amount/15} F{purge_move_speed}               # Lado 2 (volta)
            G1 X{purge_x_origin + size + 2 + (line_spacing * 2)} F{purge_move_speed}  # Move para o lado
            G1 Y{purge_y_origin + square_size} E{purge_amount/15} F{purge_move_speed} # Lado 3 (ida)
            
            {RETRACT}                                       # Retrai ao terminar
            G0 Z{purge_height * 2} F{travel_speed}          # Sobe para finalizar
            # --- FIM DO QUADRADO ---



            # --- MOVIMENTO DE SAÍDA SEGURA (ANTI-BOLA DE TPU) ---
            {RETRACT}                                        # Retrai para tirar pressão
            G91                                              # Muda para modo Relativo
            G1 Z2 X20 F{travel_speed}                        # Sobe 2mm e move 20mm pro lado ao mesmo tempo (Rápido!)
            G0 Z{purge_height} F{purge_move_speed}          # Desce para altura de impressão
            G1 X40 Y0 E0.5 F900

            G90                                              # Volta para modo Absoluto
            # --- FIM DO MOVIMENTO ---




            # # --- INÍCIO DO MOVIMENTO DE LIMPEZA (ORBIT 3X) ---
            # {% set orbit_speed = 3000 %} # Velocidade de 50mm/s (Ajuste aqui se quiser mais lento)
            
            # G0 Z{purge_height * 2} F{travel_speed}          # Sobe para deslocamento inicial
            # G0 X{purge_x_origin - 2} Y{purge_y_origin - 2}  # Vai para o canto inicial do orbit
            # G0 Z0.4 F{orbit_speed}                          # Desce para a altura de limpeza

            # # Repetição do Quadrado de Limpeza (3 voltas)
            # {% for repetition in range(3) %}
            #     G1 X{purge_x_origin + size + 2} F{orbit_speed} # Lado inferior
            #     G1 Y{purge_y_origin + size + 2}                # Lado direito
            #     G1 X{purge_x_origin - 2}                       # Lado superior
            #     G1 Y{purge_y_origin - 2}                       # Lado esquerdo
            # {% endfor %}

            # G0 Z{purge_height * 5} F{travel_speed}          # Sobe rápido para quebrar qualquer fio restante
            # # --- FIM DO MOVIMENTO DE LIMPEZA ---


            
            G92 E0                                                                                          # Reset extruder distance
            M82                                                                                             # Absolute extrusion mode
            G0 Z{purge_height*2} F{travel_speed}                                                            # Z hop

            RESTORE_GCODE_STATE NAME=Prepurge_State                                                         # Restore gcode state

    {% endif %}
